<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Score Dashboard</title>

<style>
/* ===== Animated Background ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow-x: hidden;
    color: white;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ===== Header ===== */
header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* ===== Container ===== */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

/* ===== Score Cards ===== */
.card {
    width: 260px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 35px rgba(0,0,0,0.5);
}

/* Team names */
.team {
    font-size: 20px;
    margin: 10px 0;
}

/* Score */
.score {
    font-size: 40px;
    font-weight: bold;
    margin: 10px 0;
    color: #00ffcc;
    transition: all 0.3s ease;
}

/* Status */
.status {
    font-size: 14px;
    opacity: 0.8;
}

/* Button */
button {
    margin-top: 30px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: white;
}

/* Fade animation */
.fade {
    animation: fadeEffect 0.5s;
}

@keyframes fadeEffect {
    from {opacity: 0.3;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<header>🔥 LIVE SPORTS SCORE DASHBOARD 🔥</header>

<div class="container">

    <div class="card" id="match1">
        <div class="team">India 🇮🇳</div>
        <div class="score" id="score1">120</div>
        <div class="team">Australia 🇦🇺</div>
        <div class="score" id="score2">115</div>
        <div class="status">Cricket Match Live</div>
    </div>

    <div class="card" id="match2">
        <div class="team">Barcelona ⚽</div>
        <div class="score" id="score3">2</div>
        <div class="team">Real Madrid ⚽</div>
        <div class="score" id="score4">2</div>
        <div class="status">Football Match Live</div>
    </div>

    <div class="card" id="match3">
        <div class="team">Lakers 🏀</div>
        <div class="score" id="score5">98</div>
        <div class="team">Bulls 🏀</div>
        <div class="score" id="score6">102</div>
        <div class="status">Basketball Live</div>
    </div>

</div>

<div style="text-align:center;">
    <button onclick="updateScores()">🔄 Refresh Scores</button>
</div>

<script>
// Random score generator
function randomChange(value) {
    let change = Math.floor(Math.random() * 5);
    return value + change;
}

// Update all scores
function updateScores() {

    let scores = [
        "score1","score2","score3","score4","score5","score6"
    ];

    scores.forEach(id => {
        let el = document.getElementById(id);
        let current = parseInt(el.innerText);
        let updated = randomChange(current);

        el.classList.add("fade");
        el.innerText = updated;

        setTimeout(() => {
            el.classList.remove("fade");
        }, 500);
    });
}

// Auto update every 3 seconds
setInterval(updateScores, 3000);
</script>

</body>
</html>
